# OpenWrt Build Configuration for CMCC PZ-L8 (AP Mode)
# This file contains custom package selections and build options

# ========================================
# TARGET CONFIGURATION
# ========================================
TARGET=qualcommax
SUBTARGET=ipq50xx
DEVICE=cmcc_pz-l8

# ========================================
# PACKAGES TO INCLUDE
# ========================================

# Essential system packages
CORE_PACKAGES="
apk-mbedtls
base-files
ca-bundle
dropbear
fstools
kmod-gpio-button-hotplug
kmod-leds-gpio
kmod-qca-nss-dp
libc
libgcc
libustream-mbedtls
logd
mtd
netifd
procd-ujail
uboot-envtools
uci
uclient-fetch
urandom-seed
urngd
zram-swap
"

# WiFi and Mesh packages
WIFI_PACKAGES="
kmod-ath11k-ahb
kmod-ath11k-smallbuffers
kmod-ath
kmod-cfg80211
kmod-mac80211
ath11k-firmware-ipq5018-qcn6122
ipq-wifi-cmcc_pz-l8
wpad-mesh-mbedtls
iw
iwinfo
usteer
"

# LuCI packages (lightweight)
LUCI_PACKAGES="
luci-base
luci-mod-admin-full
luci-theme-bootstrap
luci-i18n-base-zh-cn
luci-i18n-package-manager-zh-cn
luci-i18n-usteer-zh-cn
luci-app-usteer
uhttpd
uhttpd-mod-ubus
"

# Additional useful packages
EXTRA_PACKAGES="
"

# ========================================
# PACKAGES TO EXCLUDE (AP Mode)
# ========================================

# Remove DNS/DHCP
EXCLUDE_DNS_DHCP="
dnsmasq
dnsmasq-full
dnsmasq-dhcpv6
odhcpd
odhcpd-ipv6only
dhcp-server
"

# Remove Firewall
EXCLUDE_FIREWALL="
firewall
firewall3
firewall4
iptables
ip6tables
kmod-ipt-core
kmod-ipt-conntrack
kmod-ipt-nat
"

# Remove PPP/PPPoE
EXCLUDE_PPP="
ppp
ppp-mod-pppoe
ppp-mod-pppol2tp
ppp-mod-pptp
chat
"

# Remove IPv6 tunneling
EXCLUDE_TUNNEL="
6in4
6rd
6to4
ds-lite
"

# Remove unnecessary LuCI apps
EXCLUDE_LUCI="
luci
luci-ssl
luci-app-acme
luci-app-aria2
luci-app-commands
luci-app-ddns
luci-app-firewall
luci-app-minidlna
luci-app-mjpg-streamer
luci-app-statistics
luci-app-transmission
luci-app-upnp
luci-app-vpn-policy-routing
luci-app-wol
"

# ========================================
# KERNEL OPTIONS
# ========================================
KERNEL_OPTIONS="
CONFIG_KERNEL_CRASHLOG=y
CONFIG_KERNEL_SWAP=y
CONFIG_KERNEL_DEBUG_FS=y
CONFIG_KERNEL_PERF_EVENTS=y
CONFIG_KERNEL_KALLSYMS=y
"

# ========================================
# BUILD OPTIONS
# ========================================
BUILD_OPTIONS="
CONFIG_DEVEL=y
CONFIG_CCACHE=y
CONFIG_USE_CCACHE=y
CONFIG_ALL_KMODS=y
CONFIG_ALL_NONSHARED=y
CONFIG_DEBUG=n
CONFIG_IPV6=n
"

# ========================================
# IMAGE OPTIONS
# ========================================
IMAGE_OPTIONS="
CONFIG_TARGET_ROOTFS_SQUASHFS=y
CONFIG_TARGET_ROOTFS_JFFS2=n
CONFIG_TARGET_ROOTFS_EXT4FS=n
CONFIG_TARGET_ROOTFS_TARGZ=n
CONFIG_TARGET_ROOTFS_CPIOGZ=n
CONFIG_TARGET_IMAGES_GZIP=y
"
