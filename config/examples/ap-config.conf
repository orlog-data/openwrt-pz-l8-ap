# OpenWrt AP Mode Configuration Examples
# Copy these files to /etc/config/ on your device

# ========================================
# /etc/config/network
# ========================================
# AP mode: All ports bridged, DHCP client on uplink

config interface 'loopback'
    option device 'lo'
    option proto 'static'
    option ipaddr '127.0.0.1'
    option netmask '255.0.0.0'

config device
    option name 'br-lan'
    option type 'bridge'
    list ports 'eth0'
    # Add ports if using DSA
    # list ports 'lan1'
    # list ports 'lan2'
    # list ports 'lan3'
    # list ports 'wan'

config interface 'lan'
    option device 'br-lan'
    option proto 'dhcp'
    # Or use static IP for easier management:
    # option proto 'static'
    # option ipaddr '192.168.1.100'
    # option netmask '255.255.255.0'
    # option gateway '192.168.1.1'
    # list dns '192.168.1.1'

# ========================================
# /etc/config/wireless
# ========================================
# Basic AP + Mesh configuration

config wifi-device 'radio0'
    option type 'mac80211'
    option path 'platform/soc/c000000.wifi'
    option channel '1'
    option band '2g'
    option htmode 'HT20'
    option country 'CN'
    option cell_density '0'

config wifi-device 'radio1'
    option type 'mac80211'
    option path 'platform/soc/c000000.wifi1'
    option channel '36'
    option band '5g'
    option htmode 'HE80'
    option country 'CN'
    option cell_density '0'

# 2.4GHz AP
config wifi-iface 'default_radio0'
    option device 'radio0'
    option network 'lan'
    option mode 'ap'
    option ssid 'OpenWrt-2.4G'
    option encryption 'sae-mixed'
    option key 'your-password'
    option ieee80211r '1'
    option ft_over_ds '1'
    option ft_psk_generate_local '1'

# 5GHz AP
config wifi-iface 'default_radio1'
    option device 'radio1'
    option network 'lan'
    option mode 'ap'
    option ssid 'OpenWrt-5G'
    option encryption 'sae-mixed'
    option key 'your-password'
    option ieee80211r '1'
    option ft_over_ds '1'
    option ft_psk_generate_local '1'

# 802.11s Mesh (optional - choose one radio)
config wifi-iface 'mesh'
    option device 'radio1'
    option ifname 'mesh0'
    option network 'lan'
    option mode 'mesh'
    option mesh_id 'my-mesh-network'
    option encryption 'sae'
    option key 'mesh-password'
    option mesh_fwding '1'
    option mesh_rssi_threshold '0'

# ========================================
# /etc/config/usteer
# ========================================
# Wireless roaming steering configuration

config usteer
    option enabled '1'
    option network 'lan'
    option local_mode '1'
    
    # Log level (0=none, 1=info, 2=debug)
    option log_level '1'
    
    # Minimum signal strength for association
    option min_snr '15'
    
    # Signal threshold for steering
    option steer_threshold '-70'
    
    # Time to wait before steering
    option steer_timeout '500'
    
    # Enable band steering
    option band_steering '1'
    
    # Prefer 5GHz when signal is above this threshold
    option band_steering_threshold='-75'
    
    # Load balancing
    option load_balancing '1'
    option load_balancing_threshold '50'
    
    # Number of connected APs (for roaming)
    option max_neighbor_reports '8'
    
    # Measurement durations
    option measurement_timeout '30'
    option measurement_interval '30'

# ========================================
# /etc/config/dhcp (minimal for AP)
# ========================================
# No DHCP server, only DNS forwarding if needed

config dnsmasq
    option domainneeded '1'
    option boguspriv '1'
    option filterwin2k '0'
    option localise_queries '1'
    option rebind_protection '1'
    option rebind_localhost '1'
    option local '/lan/'
    option domain 'lan'
    option expandhosts '1'
    option nonegcache '0'
    option authoritative '1'
    option readethers '1'
    option leasefile '/tmp/dhcp.leases'
    option resolvfile '/tmp/resolv.conf.d/resolv.conf.auto'
    option nonwildcard '1'
    option localservice '1'
    option ednspacket_max '1232'
    # Disable DHCP server
    option no_dhcp '1'

# No DHCP pools needed for AP mode

# ========================================
# /etc/config/firewall
# ========================================
# Minimal firewall for AP (mostly disabled)

config defaults
    option input 'ACCEPT'
    option output 'ACCEPT'
    option forward 'ACCEPT'
    option drop_invalid '1'
    option syn_flood '0'

config zone
    option name 'lan'
    option input 'ACCEPT'
    option output 'ACCEPT'
    option forward 'ACCEPT'
    list network 'lan'

# ========================================
# /etc/config/system
# ========================================

config system
    option hostname 'OpenWrt-AP'
    option timezone 'CST-8'
    option ttylogin '0'
    option log_size '64'
    option urandom_seed '0'

config timeserver 'ntp'
    option enabled '1'
    option enable_server '0'
    list server '0.openwrt.pool.ntp.org'
    list server '1.openwrt.pool.ntp.org'
    list server '2.openwrt.pool.ntp.org'
    list server '3.openwrt.pool.ntp.org'

config led 'led_wan'
    option name 'WAN'
    option sysfs 'green:wan'
    option trigger 'netdev'
    option mode 'link tx rx'
    option dev 'eth0'

config led 'led_system'
    option name 'System'
    option sysfs 'green:system'
    option trigger 'heartbeat'

# ========================================
# Post-install commands
# ========================================
# Run these commands after first boot:

# Disable firewall completely (optional)
# /etc/init.d/firewall disable
# /etc/init.d/firewall stop

# Enable usteer
# /etc/init.d/usteer enable
# /etc/init.d/usteer start

# Set root password
# passwd

# Configure SSH keys (recommended)
# mkdir -p /etc/dropbear
# echo "your-ssh-public-key" > /etc/dropbear/authorized_keys
# chmod 600 /etc/dropbear/authorized_keys
