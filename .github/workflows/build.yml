# GitHub Actions workflow for building OpenWrt firmware for CMCC PZ-L8
# Target: AP mode only with mesh support
# Features: Optimized caching for faster builds, WiFi BDF from firmware_qca-wireless PR #106

name: Build OpenWrt for CMCC PZ-L8 (AP Mode)

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag (leave empty for no release)'
        required: false
        default: ''
  push:
    tags:
      - 'v*'

env:
  TARGET: qualcommax
  SUBTARGET: ipq50xx
  DEVICE: cmcc_pz-l8

jobs:
  build:
    name: Build Firmware
    runs-on: ubuntu-22.04
    timeout-minutes: 720
    
    steps:
      - name: Maximize build space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 512
          swap-size-mb: 1024
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'
          remove-docker-images: 'true'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git \
            libncurses-dev libssl-dev python3-distutils \
            python3-setuptools python3-dev rsync swig unzip \
            zlib1g-dev file wget curl jq device-tree-compiler \
            ccache libelf-dev libdw-dev libiberty-dev

      - name: Checkout OpenWrt
        uses: actions/checkout@v4
        with:
          repository: openwrt/openwrt
          ref: main
          path: openwrt
          fetch-depth: 0

      - name: Fetch PR #21495
        working-directory: openwrt
        run: |
          git fetch origin pull/21495/head:pr-21495
          git config user.email "builder@github.com"
          git config user.name "GitHub Actions"
          git merge pr-21495 --no-edit || git merge pr-21495 --allow-unrelated-histories --no-edit || true

      - name: Download BDF files for PZ-L8 WiFi
        working-directory: openwrt
        run: |
          # According to ipq-wifi Makefile:
          # "To add local files for testing:
          #  1. create a new directory in the ipq-wifi package directory called "files".
          #  2. place there the needed board files."
          
          # Create files directory for local board files
          mkdir -p package/firmware/ipq-wifi/files
          
          # Download BDF files from firmware_qca-wireless PR #106
          # These files were extracted from official PZ-L8 firmware 501.11
          # by sqliuchang and encoded using ath11k-bdencoder
          
          # IPQ5000 (2.4GHz SoC built-in WiFi)
          # BoardNames: bus=ahb,qmi-chip-id=0,qmi-board-id=255,variant=CMCC-PZ-L8
          curl -L -o package/firmware/ipq-wifi/files/board-cmcc_pz-l8.ipq5018 \
            "https://github.com/openwrt/firmware_qca-wireless/raw/f7ad5fee1924efdb5d8b2d1bf95bd3867d22e701/board-cmcc_pz-l8.ipq5018"
          
          # QCN6102 (5GHz external WiFi module)
          # BoardNames: bus=ahb,qmi-chip-id=0,qmi-board-id=255,variant=CMCC-PZ-L8
          curl -L -o package/firmware/ipq-wifi/files/board-cmcc_pz-l8.qcn6122 \
            "https://github.com/openwrt/firmware_qca-wireless/raw/f7ad5fee1924efdb5d8b2d1bf95bd3867d22e701/board-cmcc_pz-l8.qcn6122"
          
          # Verify downloads
          echo "Downloaded BDF files:"
          ls -la package/firmware/ipq-wifi/files/
          
          # Check file sizes (should be ~131KB each, MD5 from PR #106)
          SIZE_IPQ=$(stat -c%s "package/firmware/ipq-wifi/files/board-cmcc_pz-l8.ipq5018")
          SIZE_QCN=$(stat -c%s "package/firmware/ipq-wifi/files/board-cmcc_pz-l8.qcn6122")
          
          echo "IPQ5018 BDF size: $SIZE_IPQ bytes (expected: 131176)"
          echo "QCN6122 BDF size: $SIZE_QCN bytes (expected: 131176)"
          
          # Verify MD5 checksums
          MD5_IPQ=$(md5sum "package/firmware/ipq-wifi/files/board-cmcc_pz-l8.ipq5018" | cut -d' ' -f1)
          MD5_QCN=$(md5sum "package/firmware/ipq-wifi/files/board-cmcc_pz-l8.qcn6122" | cut -d' ' -f1)
          
          echo "IPQ5018 MD5: $MD5_IPQ (expected: 95bc22178d4a3a3c63a5b258f3849c84)"
          echo "QCN6122 MD5: $MD5_QCN (expected: e7f17e4b791a83ca919f6954ce16a350)"
          
          if [ "$SIZE_IPQ" -lt 100000 ] || [ "$SIZE_QCN" -lt 100000 ]; then
            echo "ERROR: BDF files appear to be incomplete or corrupted"
            exit 1
          fi
          
          echo "BDF files downloaded and verified successfully!"
          echo "Files will be installed to /lib/firmware/ath11k/IPQ5018/hw1.0/board-2.bin"

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-${{ env.TARGET }}-${{ hashFiles('openwrt/feeds.conf.default') }}
          restore-keys: ccache-${{ env.TARGET }}-

      - name: Cache toolchain
        uses: actions/cache@v4
        with:
          path: openwrt/staging_dir
          key: toolchain-${{ env.TARGET }}-${{ hashFiles('openwrt/include/version.mk') }}
          restore-keys: toolchain-${{ env.TARGET }}-

      - name: Cache build_dir
        uses: actions/cache@v4
        with:
          path: |
            openwrt/build_dir/host
            openwrt/build_dir/target-aarch64_cortex-a53_musl
          key: builddir-${{ env.TARGET }}-${{ hashFiles('openwrt/include/version.mk') }}
          restore-keys: builddir-${{ env.TARGET }}-

      - name: Configure ccache
        run: |
          ccache --set-config=cache_dir=~/.ccache
          ccache --set-config=max_size=10G
          ccache --set-config=compression=true
          ccache -z

      - name: Update feeds
        working-directory: openwrt
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Create custom files for AP mode
        working-directory: openwrt
        run: |
          # Create custom files directory
          mkdir -p files/etc/uci-defaults
          mkdir -p files/etc/config
          
          # Network configuration for AP mode
          # All ports (lan1, lan2, lan3, wan) bridged together
          # DHCP client with static fallback on 192.168.1.1
          cat > files/etc/config/network << 'EOF'
          config interface 'loopback'
              option device 'lo'
              option proto 'static'
              option ipaddr '127.0.0.1'
              option netmask '255.0.0.0'

          config device
              option name 'br-lan'
              option type 'bridge'
              list ports 'lan1'
              list ports 'lan2'
              list ports 'lan3'
              list ports 'wan'

          config interface 'lan'
              option device 'br-lan'
              option proto 'dhcp'

          config interface 'lan_static'
              option device 'br-lan'
              option proto 'static'
              option ipaddr '192.168.1.1'
              option netmask '255.255.255.0'
          EOF

          # uci-defaults script to ensure AP mode network config on first boot
          cat > files/etc/uci-defaults/99-ap-mode-network << 'EOF'
          #!/bin/sh
          # AP Mode Network Configuration for CMCC PZ-L8
          # Bridges all ports (lan1, lan2, lan3, wan) together

          uci -q batch << 'UCI'
          delete network.@device[0]
          delete network.lan
          delete network.wan
          delete network.wan6

          set network.br_lan='device'
          set network.br_lan.name='br-lan'
          set network.br_lan.type='bridge'
          add_list network.br_lan.ports='lan1'
          add_list network.br_lan.ports='lan2'
          add_list network.br_lan.ports='lan3'
          add_list network.br_lan.ports='wan'

          set network.lan='interface'
          set network.lan.device='br-lan'
          set network.lan.proto='dhcp'

          set network.lan_static='interface'
          set network.lan_static.device='br-lan'
          set network.lan_static.proto='static'
          set network.lan_static.ipaddr='192.168.1.1'
          set network.lan_static.netmask='255.255.255.0'
          UCI

          uci commit network
          exit 0
          EOF
          chmod +x files/etc/uci-defaults/99-ap-mode-network

      - name: Generate configuration
        working-directory: openwrt
        run: |
          cat > .config << 'EOF'
          # Target
          CONFIG_TARGET_qualcommax=y
          CONFIG_TARGET_qualcommax_ipq50xx=y
          CONFIG_TARGET_qualcommax_ipq50xx_DEVICE_cmcc_pz-l8=y

          # Build
          CONFIG_DEVEL=y
          CONFIG_CCACHE=y
          CONFIG_USE_CCACHE=y
          CONFIG_ALL_KMODS=y
          CONFIG_ALL_NONSHARED=y

          # Image
          CONFIG_TARGET_ROOTFS_SQUASHFS=y
          CONFIG_TARGET_IMAGES_GZIP=y

          # Include custom files
          CONFIG_INCLUDE_CONFIG=y

          # Kernel
          CONFIG_KERNEL_CRASHLOG=y
          CONFIG_KERNEL_SWAP=y
          CONFIG_KERNEL_DEBUG_FS=y

          # Disable router components
          CONFIG_PACKAGE_dnsmasq=n
          CONFIG_PACKAGE_odhcpd=n
          CONFIG_PACKAGE_firewall4=n
          CONFIG_PACKAGE_ppp=n
          CONFIG_PACKAGE_ppp-mod-pppoe=n
          CONFIG_PACKAGE_luci-app-firewall=n

          # mbedtls
          CONFIG_PACKAGE_libustream-mbedtls=y

          # WiFi - ath11k-smallbuffers for 256MB RAM devices
          CONFIG_PACKAGE_kmod-ath11k-ahb=y
          CONFIG_PACKAGE_kmod-ath11k-smallbuffers=y
          CONFIG_PACKAGE_ath11k-firmware-ipq5018-qcn6122=y
          CONFIG_PACKAGE_ipq-wifi-cmcc_pz-l8=y
          CONFIG_PACKAGE_wpad-mesh-mbedtls=y

          # Mesh
          CONFIG_PACKAGE_usteer=y
          CONFIG_PACKAGE_luci-app-usteer=y

          # LuCI minimal
          CONFIG_PACKAGE_luci-base=y
          CONFIG_PACKAGE_luci-mod-admin-full=y
          CONFIG_PACKAGE_luci-theme-bootstrap=y
          CONFIG_PACKAGE_luci-i18n-base-zh-cn=y
          CONFIG_PACKAGE_luci-i18n-package-manager-zh-cn=y
          CONFIG_PACKAGE_luci-i18n-usteer-zh-cn=y
          CONFIG_PACKAGE_uhttpd=y
          CONFIG_PACKAGE_uhttpd-mod-ubus=y
          CONFIG_PACKAGE_luci=n

          # Core
          CONFIG_PACKAGE_apk-mbedtls=y
          CONFIG_PACKAGE_base-files=y
          CONFIG_PACKAGE_ca-bundle=y
          CONFIG_PACKAGE_dropbear=y
          CONFIG_PACKAGE_fstools=y
          CONFIG_PACKAGE_kmod-gpio-button-hotplug=y
          CONFIG_PACKAGE_kmod-leds-gpio=y
          CONFIG_PACKAGE_kmod-qca-nss-dp=y
          CONFIG_PACKAGE_logd=y
          CONFIG_PACKAGE_mtd=y
          CONFIG_PACKAGE_netifd=y
          CONFIG_PACKAGE_procd-ujail=y
          CONFIG_PACKAGE_uboot-envtools=y
          CONFIG_PACKAGE_uci=y
          CONFIG_PACKAGE_urandom-seed=y
          CONFIG_PACKAGE_urngd=y
          CONFIG_PACKAGE_zram-swap=y
          CONFIG_PACKAGE_iw=y
          CONFIG_PACKAGE_iwinfo=y
          EOF
          make defconfig

      - name: Download sources
        working-directory: openwrt
        run: make download -j$(nproc)

      - name: Build
        working-directory: openwrt
        run: make -j$(nproc) V=w || make -j1 V=s

      - name: Show ccache stats
        run: ccache -s

      - name: Prepare artifacts
        run: |
          mkdir -p release
          find openwrt/bin/targets -name "*.bin" -exec cp {} release/ \;
          find openwrt/bin/targets -name "*.img.gz" -exec cp {} release/ \;
          cd release && sha256sum * > sha256sums
          
          cat > BUILD_INFO.txt << EOF
          Build: $(date -u +"%Y-%m-%d %H:%M:%S UTC")
          Target: ${{ env.TARGET }}/${{ env.SUBTARGET }}
          Device: ${{ env.DEVICE }}
          Mode: AP Only with Mesh
          PR: #21495 applied (ath11k-smallbuffers)
          BDF: firmware_qca-wireless PR #106 (from official 501.11 firmware)
          
          Network Configuration:
          - All ports (lan1, lan2, lan3, wan) bridged to br-lan
          - DHCP client enabled
          - Static fallback: 192.168.1.1
          
          WiFi:
          - 2.4GHz: IPQ5000 (SoC built-in)
          - 5GHz: QCN6102
          - Driver: ath11k-smallbuffers (optimized for 256MB RAM)
          EOF

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-${{ env.DEVICE }}-${{ github.run_number }}
          path: release/
          retention-days: 30

      - name: Create release
        if: inputs.release_tag != '' || startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ inputs.release_tag || github.ref_name }}
          files: release/*
          body: |
            OpenWrt Firmware for CMCC PZ-L8 (AP Mode)
            
            ## Features
            - AP Mode Only
            - Mesh support (802.11s)
            - usteer for roaming
            - ath11k-smallbuffers for low-RAM optimization (256MB)
            - WiFi BDF from official firmware 501.11
            
            ## Network Configuration
            - All ports (lan1, lan2, lan3, wan) bridged together
            - DHCP client enabled
            - Static fallback IP: 192.168.1.1
            
            ## WiFi
            - 2.4GHz: IPQ5000 (SoC built-in)
            - 5GHz: QCN6102
            
            ## Known Issues
            - First boot may take longer due to uci-defaults execution
            - WiFi may need a few seconds to initialize after boot
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
