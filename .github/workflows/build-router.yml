# GitHub Actions workflow for building OpenWrt firmware for CMCC PZ-L8
# Target: Router mode with full routing features
# Based on openwrt-25.12 branch with manual patches

name: Build OpenWrt for CMCC PZ-L8 (Router Mode)

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag (leave empty for no release)'
        required: false
        default: ''

env:
  TARGET: qualcommax
  SUBTARGET: ipq50xx
  DEVICE: cmcc_pz-l8

jobs:
  build:
    name: Build Firmware
    runs-on: ubuntu-22.04
    timeout-minutes: 720

    steps:
      - name: Maximize build space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 2048
          swap-size-mb: 1024
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'
          remove-docker-images: 'true'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git \
            libncurses-dev libssl-dev python3-distutils \
            python3-setuptools python3-dev rsync swig unzip \
            zlib1g-dev file wget curl jq device-tree-compiler \
            ccache libelf-dev libdw-dev libiberty-dev

      - name: Checkout OpenWrt
        uses: actions/checkout@v4
        with:
          repository: openwrt/openwrt
          ref: openwrt-25.12
          path: openwrt
          fetch-depth: 0

      - name: Download BDF files for PZ-L8 WiFi
        working-directory: openwrt
        run: |
          # BDF (Board Data Files) are required for ath11k WiFi driver
          # Source: firmware_qca-wireless PR #106 (extracted from official 501.11 firmware)

          mkdir -p files/lib/firmware/ath11k/IPQ5018/hw1.0
          mkdir -p files/lib/firmware/ath11k/QCN6122/hw1.0

          # IPQ5000 (2.4GHz SoC built-in WiFi)
          curl -L -o files/lib/firmware/ath11k/IPQ5018/hw1.0/board-2.bin \
            "https://github.com/openwrt/firmware_qca-wireless/raw/f7ad5fee1924efdb5d8b2d1bf95bd3867d22e701/board-cmcc_pz-l8.ipq5018"

          # QCN6102 (5GHz external WiFi module)
          curl -L -o files/lib/firmware/ath11k/QCN6122/hw1.0/board-2.bin \
            "https://github.com/openwrt/firmware_qca-wireless/raw/f7ad5fee1924efdb5d8b2d1bf95bd3867d22e701/board-cmcc_pz-l8.qcn6122"

          echo "=== Downloaded BDF files ==="
          ls -la files/lib/firmware/ath11k/IPQ5018/hw1.0/
          ls -la files/lib/firmware/ath11k/QCN6122/hw1.0/

          SIZE_IPQ=$(stat -c%s "files/lib/firmware/ath11k/IPQ5018/hw1.0/board-2.bin")
          SIZE_QCN=$(stat -c%s "files/lib/firmware/ath11k/QCN6122/hw1.0/board-2.bin")

          if [ "$SIZE_IPQ" -lt 100000 ] || [ "$SIZE_QCN" -lt 100000 ]; then
            echo "ERROR: BDF files appear to be incomplete"
            exit 1
          fi

          echo "BDF files downloaded successfully!"

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-${{ env.TARGET }}-router-v5-${{ hashFiles('openwrt/feeds.conf.default') }}
          restore-keys: |
            ccache-${{ env.TARGET }}-router-v5-
            ccache-${{ env.TARGET }}-v5-

      - name: Cache toolchain
        uses: actions/cache@v4
        with:
          path: openwrt/staging_dir
          key: toolchain-${{ env.TARGET }}-router-v5-${{ hashFiles('openwrt/include/version.mk') }}
          restore-keys: |
            toolchain-${{ env.TARGET }}-router-v5-
            toolchain-${{ env.TARGET }}-v5-

      - name: Configure ccache
        run: |
          ccache --set-config=cache_dir=~/.ccache
          ccache --set-config=max_size=10G
          ccache --set-config=compression=true
          ccache -z

      - name: Update feeds
        working-directory: openwrt
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Apply PZ-L8 patches
        working-directory: openwrt
        run: |
          # Patch 1: Enable WiFi in DTS
          DTS_FILE="target/linux/qualcommax/files/arch/arm64/boot/dts/qcom/ipq5018-pz-l8.dts"
          sed -i 's/status = "disabled";/status = "okay";/g' "$DTS_FILE"
          sed -i '/&q6v5_wcss {/,/};/c\&q6v5_wcss {\n\tboot-args = </*       type:*\t*/ 0x2 /* PCIE1\t*/\n\t\t     /*     length:*\t*/ 4\n\t\t     /*     UPD ID:*\t*/ 2\n\t\t     /* reset GPIO:*\t*/ 27\n\t\t     /*   reserved:*\t*/ 0 0>;\n\tstatus = "okay";\n};' "$DTS_FILE" || true
          
          echo "=== Patched DTS file ==="

          # Patch 2: Add ath11k-smallbuffers patch
          PATCH_DIR="package/kernel/mac80211/patches/ath11k"
          mkdir -p "$PATCH_DIR"
          
          cat > "$PATCH_DIR/951-wifi-ath11k-introduct-CONFIG_ATH11K_SMALLBUFFERS.patch" << 'PATCHEOF'
From 4032fbc94b8cde0ff761b6dd6a278420e6f052b4 Mon Sep 17 00:00:00 2001
From: Ziyang Huang <hzyitc@outlook.com>
Date: Sun, 8 Sep 2024 16:52:04 +0800
Subject: [PATCH 1/1] wifi: ath11k: introduct CONFIG_ATH11K_SMALLBUFFERS

Signed-off-by: Ziyang Huang <hzyitc@outlook.com>
---
 drivers/net/wireless/ath/ath11k/dp.h | 10 +++++-----
 1 file changed, 5 insertions(+), 5 deletions(-)

diff --git a/drivers/net/wireless/ath/ath11k/dp.h b/drivers/net/wireless/ath/ath11k/dp.h
index 7a55afd33be8..d3d3b2aa800c 100644
--- a/drivers/net/wireless/ath/ath11k/dp.h
+++ b/drivers/net/wireless/ath/ath11k/dp.h
@@ -206,7 +206,7 @@ struct ath11k_pdev_dp {
 #define DP_WBM_RELEASE_RING_SIZE	64
 #define DP_TCL_DATA_RING_SIZE		512
 #define DP_TCL_DATA_RING_SIZE_WCN6750	2048
-#define DP_TX_COMP_RING_SIZE		32768
+#define DP_TX_COMP_RING_SIZE		(!IS_ENABLED(CONFIG_ATH11K_SMALLBUFFERS) ? 32768 : 2048)
 #define DP_TX_IDR_SIZE			DP_TX_COMP_RING_SIZE
 #define DP_TCL_CMD_RING_SIZE		32
 #define DP_TCL_STATUS_RING_SIZE		32
@@ -217,12 +217,12 @@ struct ath11k_pdev_dp {
 #define DP_REO_EXCEPTION_RING_SIZE	128
 #define DP_REO_CMD_RING_SIZE		256
 #define DP_REO_STATUS_RING_SIZE		2048
-#define DP_RXDMA_BUF_RING_SIZE		4096
+#define DP_RXDMA_BUF_RING_SIZE		(!IS_ENABLED(CONFIG_ATH11K_SMALLBUFFERS) ? 4096 : 1024)
 #define DP_RXDMA_REFILL_RING_SIZE	2048
 #define DP_RXDMA_ERR_DST_RING_SIZE	1024
-#define DP_RXDMA_MON_STATUS_RING_SIZE	1024
-#define DP_RXDMA_MONITOR_BUF_RING_SIZE	4096
-#define DP_RXDMA_MONITOR_DST_RING_SIZE	2048
+#define DP_RXDMA_MON_STATUS_RING_SIZE	(!IS_ENABLED(CONFIG_ATH11K_SMALLBUFFERS) ? 1024 : 512)
+#define DP_RXDMA_MONITOR_BUF_RING_SIZE	(!IS_ENABLED(CONFIG_ATH11K_SMALLBUFFERS) ? 4096 : 128)
+#define DP_RXDMA_MONITOR_DST_RING_SIZE	(!IS_ENABLED(CONFIG_ATH11K_SMALLBUFFERS) ? 2048 : 128)
 #define DP_RXDMA_MONITOR_DESC_RING_SIZE	4096
 
 #define DP_RX_RELEASE_RING_NUM	3
-- 
2.40.1
PATCHEOF

          # Patch 3: Update ath.mk
          ATH_MK="package/kernel/mac80211/ath.mk"
          sed -i 's/ath11k ath11k-ahb/ath11k ath11k-smallbuffers ath11k-ahb/' "$ATH_MK"
          sed -i 's/config-\$(call config_package,ath11k) += ATH11K/config-$(call config_package,ath11k,regular) += ATH11K\nconfig-$(call config_package,ath11k-smallbuffers,smallbuffers) += ATH11K ATH11K_SMALLBUFFERS/' "$ATH_MK"

          # Patch 4: Update mac80211 Makefile
          MAC80211_MK="package/kernel/mac80211/Makefile"
          sed -i '/C_DEFINES+= -DCONFIG_ATH10K_SMALLBUFFERS/a\\tC_DEFINES+= -DCONFIG_ATH11K_SMALLBUFFERS' "$MAC80211_MK"

          # Patch 5: Update ipq50xx.mk
          IPQ50XX_MK="target/linux/qualcommax/image/ipq50xx.mk"
          sed -i '/define Device\/cmcc_pz-l8/,/^endef$/s/^endef$/\tDEVICE_PACKAGES := kmod-ath11k-smallbuffers ath11k-firmware-ipq5018-qcn6122\nendef/' "$IPQ50XX_MK"

          # Patch 6: Update caldata script
          CALDATA="target/linux/qualcommax/ipq50xx/base-files/etc/hotplug.d/firmware/11-ath11k-caldata"
          if [ -f "$CALDATA" ]; then
            sed -i '/xiaomi,ax6000)/i\\tcmcc,pz-l8)|\\' "$CALDATA" 2>/dev/null || true
          fi

          echo "=== Patches applied successfully ==="

      - name: Generate configuration
        working-directory: openwrt
        run: |
          cat > .config << 'EOF'
          # Target
          CONFIG_TARGET_qualcommax=y
          CONFIG_TARGET_qualcommax_ipq50xx=y
          CONFIG_TARGET_qualcommax_ipq50xx_DEVICE_cmcc_pz-l8=y

          # Build
          CONFIG_DEVEL=y
          CONFIG_CCACHE=y
          CONFIG_USE_CCACHE=y
          CONFIG_ALL_KMODS=y
          CONFIG_ALL_NONSHARED=y

          # Image
          CONFIG_TARGET_ROOTFS_SQUASHFS=y
          CONFIG_TARGET_IMAGES_GZIP=y
          CONFIG_INCLUDE_CONFIG=y

          # Kernel
          CONFIG_KERNEL_CRASHLOG=y
          CONFIG_KERNEL_SWAP=y
          CONFIG_KERNEL_DEBUG_FS=y

          # mbedtls
          CONFIG_PACKAGE_libustream-mbedtls=y

          # WiFi
          CONFIG_PACKAGE_kmod-ath11k-ahb=y
          CONFIG_PACKAGE_kmod-ath11k-smallbuffers=y
          CONFIG_PACKAGE_ath11k-firmware-ipq5018-qcn6122=y
          CONFIG_PACKAGE_ipq-wifi-cmcc_pz-l8=m
          CONFIG_PACKAGE_wpad-basic-mbedtls=y

          # LuCI
          CONFIG_PACKAGE_luci=y

          # Router packages
          CONFIG_PACKAGE_apk-mbedtls=y
          CONFIG_PACKAGE_base-files=y
          CONFIG_PACKAGE_ca-bundle=y
          CONFIG_PACKAGE_dnsmasq=y
          CONFIG_PACKAGE_dropbear=y
          CONFIG_PACKAGE_firewall4=y
          CONFIG_PACKAGE_fstools=y
          CONFIG_PACKAGE_kmod-ath11k-ahb=y
          CONFIG_PACKAGE_kmod-gpio-button-hotplug=y
          CONFIG_PACKAGE_kmod-leds-gpio=y
          CONFIG_PACKAGE_kmod-nft-offload=y
          CONFIG_PACKAGE_kmod-qca-nss-dp=y
          CONFIG_PACKAGE_libustream-mbedtls=y
          CONFIG_PACKAGE_logd=y
          CONFIG_PACKAGE_mtd=y
          CONFIG_PACKAGE_netifd=y
          CONFIG_PACKAGE_nftables=y
          CONFIG_PACKAGE_odhcp6c=y
          CONFIG_PACKAGE_odhcpd-ipv6only=y
          CONFIG_PACKAGE_ppp=y
          CONFIG_PACKAGE_ppp-mod-pppoe=y
          CONFIG_PACKAGE_procd-ujail=y
          CONFIG_PACKAGE_uboot-envtools=y
          CONFIG_PACKAGE_uci=y
          CONFIG_PACKAGE_uclient-fetch=y
          CONFIG_PACKAGE_urandom-seed=y
          CONFIG_PACKAGE_urngd=y
          CONFIG_PACKAGE_zram-swap=y
          CONFIG_PACKAGE_iw=y
          CONFIG_PACKAGE_iwinfo=y
          EOF

          # Run defconfig to normalize
          make defconfig
          make defconfig

      - name: Download sources
        working-directory: openwrt
        run: |
          # Retry download up to 3 times with increasing delay
          for i in 1 2 3; do
            echo "Download attempt $i/3..."
            if make download -j$(nproc) V=s; then
              echo "Download successful!"
              break
            fi
            if [ $i -eq 3 ]; then
              echo "All download attempts failed!"
              exit 1
            fi
            echo "Download failed, waiting 30s before retry..."
            sleep 30
          done

      - name: Build
        working-directory: openwrt
        run: make -j$(nproc) V=w || make -j1 V=s

      - name: Show ccache stats
        run: ccache -s

      - name: Verify BDF files are in place
        working-directory: openwrt
        run: |
          echo "=== Verifying BDF files ==="
          ls -la files/lib/firmware/ath11k/IPQ5018/hw1.0/
          ls -la files/lib/firmware/ath11k/QCN6122/hw1.0/
          echo "==========================="

      - name: Prepare artifacts
        run: |
          mkdir -p release
          find openwrt/bin/targets -name "*.bin" -exec cp {} release/ \;
          find openwrt/bin/targets -name "*.img.gz" -exec cp {} release/ \;
          cd release && sha256sum * > sha256sums

          cat > BUILD_INFO.txt << EOF
          Build: $(date -u +"%Y-%m-%d %H:%M:%S UTC")
          Target: ${{ env.TARGET }}/${{ env.SUBTARGET }}
          Device: ${{ env.DEVICE }}
          Mode: Router (Full Features)
          Branch: openwrt-25.12
          Patches: ath11k-smallbuffers (manual)

          Network Configuration:
          - WAN port for PPPoE/DHCP
          - LAN ports bridged (lan1, lan2, lan3)
          - Full routing with firewall

          WiFi:
          - 2.4GHz: IPQ5000 (SoC built-in)
          - 5GHz: QCN6102
          - Driver: ath11k-smallbuffers
          EOF

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-${{ env.DEVICE }}-router-${{ github.run_number }}
          path: release/
          retention-days: 30

      - name: Create release
        if: inputs.release_tag != ''
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ inputs.release_tag }}
          files: release/*
          body: |
            OpenWrt Firmware for CMCC PZ-L8 (Router Mode)

            ## Features
            - Full Router Mode with firewall
            - PPPoE/DHCP WAN support
            - IPv6 support (odhcp6c + odhcpd-ipv6only)
            - ath11k-smallbuffers for low-RAM optimization
            - WiFi BDF from official firmware 501.11
            - Based on openwrt-25.12 stable branch

            ## Network Configuration
            - WAN: wan port (DHCP or PPPoE client)
            - LAN: lan1, lan2, lan3 bridged

            ## WiFi
            - 2.4GHz: IPQ5000 (SoC built-in)
            - 5GHz: QCN6102
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
