# GitHub Actions workflow for building OpenWrt firmware for CMCC PZ-L8
# Optimized version with better caching and faster builds
# Target: AP mode only with mesh support

name: Build OpenWrt (Optimized)

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag (leave empty for no release)'
        required: false
        default: ''
  push:
    tags:
      - 'v*'
  schedule:
    # Weekly build on Sunday at 00:00 UTC
    - cron: '0 0 * * 0'

env:
  TARGET: qualcommax
  SUBTARGET: ipq50xx
  DEVICE: cmcc_pz-l8

jobs:
  prepare:
    name: Prepare Build
    runs-on: ubuntu-22.04
    outputs:
      timestamp: ${{ steps.time.outputs.timestamp }}
      openwrt_commit: ${{ steps.commit.outputs.commit }}
    
    steps:
      - name: Get timestamp
        id: time
        run: echo "timestamp=$(date +%Y%m%d-%H%M)" >> $GITHUB_OUTPUT
      
      - name: Get OpenWrt commit
        id: commit
        run: |
          COMMIT=$(curl -s https://api.github.com/repos/openwrt/openwrt/commits/main | jq -r '.sha[:7]')
          echo "commit=$COMMIT" >> $GITHUB_OUTPUT

  build:
    name: Build Firmware
    runs-on: ubuntu-22.04
    needs: prepare
    timeout-minutes: 720  # 12 hours max
    
    steps:
      - name: Maximize build space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 512
          swap-size-mb: 1024
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'
          remove-docker-images: 'true'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang flex bison g++ gawk gcc-multilib \
            g++-multilib gettext git libncurses-dev libssl-dev \
            python3-distutils python3-setuptools python3-dev \
            rsync swig unzip zlib1g-dev file wget curl jq \
            device-tree-compiler ccache libelf-dev

      - name: Checkout OpenWrt
        uses: actions/checkout@v4
        with:
          repository: openwrt/openwrt
          ref: main
          path: openwrt
          fetch-depth: 0

      - name: Fetch PR #21495
        working-directory: openwrt
        run: |
          git fetch origin pull/21495/head:pr-21495
          git config user.email "builder@github.com"
          git config user.name "GitHub Actions"
          git merge pr-21495 --no-edit || git merge pr-21495 --allow-unrelated-histories --no-edit || true

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-${{ env.TARGET }}-${{ needs.prepare.outputs.openwrt_commit }}
          restore-keys: |
            ccache-${{ env.TARGET }}-
            ccache-

      - name: Cache toolchain
        uses: actions/cache@v4
        with:
          path: openwrt/staging_dir
          key: toolchain-${{ env.TARGET }}-${{ needs.prepare.outputs.openwrt_commit }}
          restore-keys: |
            toolchain-${{ env.TARGET }}-
            toolchain-

      - name: Cache build_dir
        uses: actions/cache@v4
        with:
          path: |
            openwrt/build_dir/host
            openwrt/build_dir/target-aarch64_cortex-a53_musl
          key: builddir-${{ env.TARGET }}-${{ needs.prepare.outputs.openwrt_commit }}
          restore-keys: |
            builddir-${{ env.TARGET }}-
            builddir-

      - name: Configure ccache
        run: |
          ccache --set-config=cache_dir=~/.ccache
          ccache --set-config=max_size=10G
          ccache --set-config=compression=true
          ccache -z

      - name: Update feeds
        working-directory: openwrt
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Generate configuration
        working-directory: openwrt
        run: |
          cat > .config << 'EOF'
          # Target
          CONFIG_TARGET_qualcommax=y
          CONFIG_TARGET_qualcommax_ipq50xx=y
          CONFIG_TARGET_qualcommax_ipq50xx_DEVICE_cmcc_pz-l8=y

          # Build
          CONFIG_DEVEL=y
          CONFIG_CCACHE=y
          CONFIG_USE_CCACHE=y
          CONFIG_ALL_KMODS=y
          CONFIG_ALL_NONSHARED=y

          # Image
          CONFIG_TARGET_ROOTFS_SQUASHFS=y
          CONFIG_TARGET_IMAGES_GZIP=y

          # Kernel
          CONFIG_KERNEL_CRASHLOG=y
          CONFIG_KERNEL_SWAP=y
          CONFIG_KERNEL_DEBUG_FS=y

          # Disable router components
          CONFIG_PACKAGE_dnsmasq=n
          CONFIG_PACKAGE_odhcpd=n
          CONFIG_PACKAGE_firewall4=n
          CONFIG_PACKAGE_ppp=n
          CONFIG_PACKAGE_ppp-mod-pppoe=n
          CONFIG_PACKAGE_luci-app-firewall=n

          # mbedtls
          CONFIG_PACKAGE_libustream-mbedtls=y

          # WiFi
          CONFIG_PACKAGE_kmod-ath11k-ahb=y
          CONFIG_PACKAGE_kmod-ath11k-smallbuffers=y
          CONFIG_PACKAGE_ath11k-firmware-ipq5018-qcn6122=y
          CONFIG_PACKAGE_ipq-wifi-cmcc_pz-l8=y
          CONFIG_PACKAGE_wpad-mesh-mbedtls=y

          # Mesh
          CONFIG_PACKAGE_usteer=y
          CONFIG_PACKAGE_luci-app-usteer=y

          # LuCI minimal
          CONFIG_PACKAGE_luci-base=y
          CONFIG_PACKAGE_luci-mod-admin-full=y
          CONFIG_PACKAGE_luci-theme-bootstrap=y
          CONFIG_PACKAGE_luci-i18n-base-zh-cn=y
          CONFIG_PACKAGE_luci-i18n-package-manager-zh-cn=y
          CONFIG_PACKAGE_luci-i18n-usteer-zh-cn=y
          CONFIG_PACKAGE_uhttpd=y
          CONFIG_PACKAGE_uhttpd-mod-ubus=y
          CONFIG_PACKAGE_luci=n

          # Core
          CONFIG_PACKAGE_apk-mbedtls=y
          CONFIG_PACKAGE_base-files=y
          CONFIG_PACKAGE_ca-bundle=y
          CONFIG_PACKAGE_dropbear=y
          CONFIG_PACKAGE_fstools=y
          CONFIG_PACKAGE_kmod-gpio-button-hotplug=y
          CONFIG_PACKAGE_kmod-leds-gpio=y
          CONFIG_PACKAGE_kmod-qca-nss-dp=y
          CONFIG_PACKAGE_logd=y
          CONFIG_PACKAGE_mtd=y
          CONFIG_PACKAGE_netifd=y
          CONFIG_PACKAGE_procd-ujail=y
          CONFIG_PACKAGE_uboot-envtools=y
          CONFIG_PACKAGE_uci=y
          CONFIG_PACKAGE_urandom-seed=y
          CONFIG_PACKAGE_urngd=y
          CONFIG_PACKAGE_zram-swap=y
          CONFIG_PACKAGE_iw=y
          CONFIG_PACKAGE_iwinfo=y
          EOF
          make defconfig

      - name: Download sources
        working-directory: openwrt
        run: make download -j$(nproc)

      - name: Build tools
        working-directory: openwrt
        run: make tools/install -j$(nproc)

      - name: Build toolchain
        working-directory: openwrt
        run: make toolchain/install -j$(nproc)

      - name: Build firmware
        working-directory: openwrt
        run: make -j$(nproc) V=w || make -j1 V=s

      - name: Show ccache stats
        run: ccache -s

      - name: Prepare artifacts
        run: |
          mkdir -p release
          find openwrt/bin/targets -name "*.bin" -exec cp {} release/ \;
          find openwrt/bin/targets -name "*.img.gz" -exec cp {} release/ \;
          cd release && sha256sum * > sha256sums
          
          # Build info
          cat > BUILD_INFO.txt << EOF
          Build: ${{ needs.prepare.outputs.timestamp }}
          Target: ${{ env.TARGET }}/${{ env.SUBTARGET }}
          Device: ${{ env.DEVICE }}
          OpenWrt: ${{ needs.prepare.outputs.openwrt_commit }}
          Mode: AP Only
          PR: #21495 applied
          EOF

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-${{ env.DEVICE }}-${{ needs.prepare.outputs.timestamp }}
          path: release/
          retention-days: 90

      - name: Create release
        if: inputs.release_tag != '' || startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ inputs.release_tag || github.ref_name }}
          files: release/*
          body: |
            OpenWrt Firmware for CMCC PZ-L8 (AP Mode)
            
            **Build**: ${{ needs.prepare.outputs.timestamp }}
            **OpenWrt Commit**: ${{ needs.prepare.outputs.openwrt_commit }}
            
            ## Features
            - AP Mode Only
            - Mesh support (802.11s)
            - usteer for roaming
            - ath11k-smallbuffers for low-RAM optimization
            
            ## Removed
            - DNS/DHCP server
            - Firewall
            - PPP/PPPoE
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  cleanup:
    name: Cleanup
    needs: build
    runs-on: ubuntu-latest
    if: always()
    
    steps:
      - name: Delete old artifacts
        uses: c-hive/gha-remove-artifacts@v1
        with:
          age: '30 days'
          skip-recent: 5
