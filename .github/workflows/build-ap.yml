# GitHub Actions workflow for building OpenWrt firmware for CMCC PZ-L8
# Target: AP mode - access point deployment
# Uses main branch with PR #21495 merged

name: Build OpenWrt for CMCC PZ-L8 (AP Mode)

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag (leave empty for no release)'
        required: false
        default: ''

env:
  TARGET: qualcommax
  SUBTARGET: ipq50xx
  DEVICE: cmcc_pz-l8

jobs:
  build:
    name: Build Firmware
    runs-on: ubuntu-22.04
    timeout-minutes: 720

    steps:
      - name: Maximize build space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 2048
          swap-size-mb: 1024
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'
          remove-docker-images: 'true'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git \
            libncurses-dev libssl-dev python3-distutils \
            python3-setuptools python3-dev rsync swig unzip \
            zlib1g-dev file wget curl jq device-tree-compiler \
            ccache libelf-dev libdw-dev libiberty-dev

      - name: Checkout OpenWrt
        uses: actions/checkout@v4
        with:
          repository: openwrt/openwrt
          ref: main
          path: openwrt
          fetch-depth: 0

      - name: Merge PR #21495
        working-directory: openwrt
        run: |
          git config user.email "builder@github.com"
          git config user.name "GitHub Actions"

          # Fetch and merge PR #21495 (PZ-L8 support + ath11k-smallbuffers)
          git fetch origin pull/21495/head:pr-21495
          git merge pr-21495 --no-edit

          # Revert ipq-wifi/Makefile changes - we handle BDF files manually
          git checkout HEAD -- package/firmware/ipq-wifi/Makefile || true

          echo "=== Merge status ==="
          git status --short
          echo "===================="

      - name: Download BDF files for PZ-L8 WiFi
        working-directory: openwrt
        run: |
          # BDF (Board Data Files) are required for ath11k WiFi driver
          # Source: firmware_qca-wireless PR #106 (extracted from official 501.11 firmware)

          mkdir -p files/lib/firmware/ath11k/IPQ5018/hw1.0
          mkdir -p files/lib/firmware/ath11k/QCN6122/hw1.0

          # IPQ5000 (2.4GHz SoC built-in WiFi)
          curl -L -o files/lib/firmware/ath11k/IPQ5018/hw1.0/board-2.bin \
            "https://github.com/openwrt/firmware_qca-wireless/raw/f7ad5fee1924efdb5d8b2d1bf95bd3867d22e701/board-cmcc_pz-l8.ipq5018"

          # QCN6102 (5GHz external WiFi module)
          curl -L -o files/lib/firmware/ath11k/QCN6122/hw1.0/board-2.bin \
            "https://github.com/openwrt/firmware_qca-wireless/raw/f7ad5fee1924efdb5d8b2d1bf95bd3867d22e701/board-cmcc_pz-l8.qcn6122"

          echo "=== Downloaded BDF files ==="
          ls -la files/lib/firmware/ath11k/IPQ5018/hw1.0/
          ls -la files/lib/firmware/ath11k/QCN6122/hw1.0/

          SIZE_IPQ=$(stat -c%s "files/lib/firmware/ath11k/IPQ5018/hw1.0/board-2.bin")
          SIZE_QCN=$(stat -c%s "files/lib/firmware/ath11k/QCN6122/hw1.0/board-2.bin")

          if [ "$SIZE_IPQ" -lt 100000 ] || [ "$SIZE_QCN" -lt 100000 ]; then
            echo "ERROR: BDF files appear to be incomplete or corrupted"
            exit 1
          fi

          echo "BDF files downloaded successfully!"

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-${{ env.TARGET }}-ap-v8-${{ hashFiles('openwrt/feeds.conf.default') }}
          restore-keys: |
            ccache-${{ env.TARGET }}-ap-v8-
            ccache-${{ env.TARGET }}-v8-

      - name: Cache toolchain
        uses: actions/cache@v4
        with:
          path: openwrt/staging_dir
          key: toolchain-${{ env.TARGET }}-ap-v8-${{ hashFiles('openwrt/include/version.mk') }}
          restore-keys: toolchain-${{ env.TARGET }}-v8-

      - name: Configure ccache
        run: |
          ccache --set-config=cache_dir=~/.ccache
          ccache --set-config=max_size=10G
          ccache --set-config=compression=true
          ccache -z

      - name: Update feeds
        working-directory: openwrt
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Create custom files for AP mode
        working-directory: openwrt
        run: |
          # Create custom files directory
          mkdir -p files/etc/uci-defaults
          mkdir -p files/etc/config

          # Network configuration for AP mode
          # All ports (lan1, lan2, lan3, wan) bridged together
          # DHCP client with static fallback on 192.168.10.1
          cat > files/etc/config/network << 'EOF'
          config interface 'loopback'
              option device 'lo'
              option proto 'static'
              option ipaddr '127.0.0.1'
              option netmask '255.0.0.0'

          config device
              option name 'br-lan'
              option type 'bridge'
              list ports 'lan1'
              list ports 'lan2'
              list ports 'lan3'
              list ports 'wan'

          config interface 'lan'
              option device 'br-lan'
              option proto 'dhcp'

          config interface 'lan_static'
              option device 'br-lan'
              option proto 'static'
              option ipaddr '192.168.10.1'
              option netmask '255.255.255.0'
          EOF

          # UCIDEFAULTS script to configure fallback IP
          cat > files/etc/uci-defaults/99-ap-mode-network << 'UCI'
          #!/bin/sh
          # Configure AP mode network with DHCP fallback

          # Set hostname
          uci set system.@system[0].hostname='OpenWrt-AP'

          # Create static interface as fallback
          uci set network.lan='interface'
          uci set network.lan.device='br-lan'
          uci set network.lan.proto='dhcp'

          uci set network.lan_static='interface'
          uci set network.lan_static.device='br-lan'
          uci set network.lan_static.proto='static'
          uci set network.lan_static.ipaddr='192.168.10.1'
          uci set network.lan_static.netmask='255.255.255.0'

          uci commit network
          exit 0
          UCI
          chmod +x files/etc/uci-defaults/99-ap-mode-network

          # IPv6 configuration for AP mode
          mkdir -p files/etc/sysctl.d
          cat > files/etc/sysctl.d/99-ipv6-ap.conf << 'EOF'
          # IPv6 AP Mode Configuration
          net.ipv6.conf.br-lan.accept_ra = 2
          net.ipv6.conf.br-lan.forwarding = 0
          net.ipv6.conf.default.accept_ra = 2
          net.ipv6.conf.default.forwarding = 0
          EOF

          echo "=== Created custom AP mode files ==="
          ls -la files/etc/uci-defaults/
          ls -la files/etc/config/
          ls -la files/etc/sysctl.d/

      - name: Generate configuration
        working-directory: openwrt
        run: |
          cat > .config << 'EOF'
          # Target
          CONFIG_TARGET_qualcommax=y
          CONFIG_TARGET_qualcommax_ipq50xx=y
          CONFIG_TARGET_qualcommax_ipq50xx_DEVICE_cmcc_pz-l8=y

          # Build
          CONFIG_DEVEL=y
          CONFIG_CCACHE=y
          CONFIG_USE_CCACHE=y
          CONFIG_ALL_KMODS=y
          CONFIG_ALL_NONSHARED=y

          # Image
          CONFIG_TARGET_ROOTFS_SQUASHFS=y
          CONFIG_TARGET_IMAGES_GZIP=y
          CONFIG_INCLUDE_CONFIG=y

          # Kernel
          CONFIG_KERNEL_CRASHLOG=y
          CONFIG_KERNEL_SWAP=y
          CONFIG_KERNEL_DEBUG_FS=y

          # Disable router components - use =m to compile but NOT install to image
          CONFIG_PACKAGE_dnsmasq=m
          CONFIG_PACKAGE_odhcpd=m
          CONFIG_PACKAGE_odhcpd-ipv6only=m
          CONFIG_PACKAGE_odhcp6c=m
          CONFIG_PACKAGE_firewall4=m
          CONFIG_PACKAGE_nftables=m
          CONFIG_PACKAGE_kmod-nft-offload=m
          CONFIG_PACKAGE_ppp=m
          CONFIG_PACKAGE_ppp-mod-pppoe=m
          CONFIG_PACKAGE_luci-app-firewall=m
          CONFIG_PACKAGE_luci-proto-ipv6=m
          CONFIG_PACKAGE_luci-proto-ppp=m

          # mbedtls
          CONFIG_PACKAGE_libustream-mbedtls=y

          # WiFi - ath11k-smallbuffers for 256MB RAM devices
          CONFIG_PACKAGE_kmod-ath11k-ahb=y
          CONFIG_PACKAGE_kmod-ath11k-smallbuffers=y
          CONFIG_PACKAGE_ath11k-firmware-ipq5018-qcn6122=y
          # Note: BDF files are included manually via files/ directory
          CONFIG_PACKAGE_wpad-mesh-mbedtls=y

          # Mesh
          CONFIG_PACKAGE_usteer=y
          CONFIG_PACKAGE_luci-app-usteer=y

          # LuCI minimal
          CONFIG_PACKAGE_luci-base=y
          CONFIG_PACKAGE_luci-mod-admin-full=y
          CONFIG_PACKAGE_luci-theme-bootstrap=y
          CONFIG_PACKAGE_luci-app-package-manager=y
          CONFIG_PACKAGE_uhttpd=y
          CONFIG_PACKAGE_uhttpd-mod-ubus=y
          CONFIG_PACKAGE_luci=m

          # Core
          CONFIG_PACKAGE_apk-mbedtls=y
          CONFIG_PACKAGE_base-files=y
          CONFIG_PACKAGE_ca-bundle=y
          CONFIG_PACKAGE_dropbear=y
          CONFIG_PACKAGE_fstools=y
          CONFIG_PACKAGE_kmod-gpio-button-hotplug=y
          CONFIG_PACKAGE_kmod-leds-gpio=y
          CONFIG_PACKAGE_kmod-qca-nss-dp=y
          CONFIG_PACKAGE_logd=y
          CONFIG_PACKAGE_mtd=y
          CONFIG_PACKAGE_netifd=y
          CONFIG_PACKAGE_procd-ujail=y
          CONFIG_PACKAGE_uboot-envtools=y
          CONFIG_PACKAGE_uci=y
          CONFIG_PACKAGE_urandom-seed=y
          CONFIG_PACKAGE_urngd=y

          # ZRAM with lzo and zstd compression (user selectable at runtime)
          # Both backends enabled, default to lzo-rle for lower CPU usage
          # User can switch via: echo zstd > /sys/block/zram0/comp_algorithm
          # Or via UCI: option zram_comp_algo 'zstd'
          CONFIG_PACKAGE_kmod-zram=y
          CONFIG_KERNEL_ZRAM_BACKEND_LZO=y
          CONFIG_KERNEL_ZRAM_BACKEND_ZSTD=y
          CONFIG_KERNEL_ZRAM_DEF_COMP_LZORLE=y
          CONFIG_PACKAGE_zram-swap=y

          CONFIG_PACKAGE_iw=y
          CONFIG_PACKAGE_iwinfo=y
          EOF

          # Run defconfig twice to normalize and resolve dependencies
          make defconfig
          make defconfig

          # Show final zram configuration
          echo "=== Final ZRAM configuration ==="
          grep -E 'ZRAM|LZO|ZSTD' .config | grep -v "^#"
          echo "================================"

      - name: Download sources
        working-directory: openwrt
        run: |
          # Retry download up to 3 times with increasing delay
          for i in 1 2 3; do
            echo "Download attempt $i/3..."
            if make download -j$(nproc) V=s; then
              echo "Download successful!"
              break
            fi
            if [ $i -eq 3 ]; then
              echo "All download attempts failed!"
              exit 1
            fi
            echo "Download failed, waiting 30s before retry..."
            sleep 30
          done

      - name: Build
        working-directory: openwrt
        run: make -j$(nproc) V=w || make -j1 V=s

      - name: Show ccache stats
        run: ccache -s

      - name: Verify BDF files are in place
        working-directory: openwrt
        run: |
          echo "=== Verifying BDF files ==="
          ls -la files/lib/firmware/ath11k/IPQ5018/hw1.0/
          ls -la files/lib/firmware/ath11k/QCN6122/hw1.0/
          echo "==========================="

      - name: Prepare artifacts
        run: |
          mkdir -p release
          find openwrt/bin/targets -name "*.bin" -exec cp {} release/ \;
          find openwrt/bin/targets -name "*.img.gz" -exec cp {} release/ \;
          cd release && sha256sum * > sha256sums

          cat > BUILD_INFO.txt << EOF
          Build: $(date -u +"%Y-%m-%d %H:%M:%S UTC")
          Target: ${{ env.TARGET }}/${{ env.SUBTARGET }}
          Device: ${{ env.DEVICE }}
          Mode: AP (Access Point)
          Branch: main
          Patches: PR #21495 (merged)

          Network Configuration:
          - All ports bridged (lan1, lan2, lan3, wan)
          - DHCP client with 192.168.10.1 fallback
          - IPv6 via SLAAC

          WiFi:
          - 2.4GHz: IPQ5000 (SoC built-in)
          - 5GHz: QCN6102
          - Driver: ath11k-smallbuffers
          - BDF: firmware_qca-wireless PR #106

          ZRAM:
          - Compression: lzo, lzo-rle, zstd (user selectable)
          - Default: lzo-rle (low CPU usage)
          - Switch: echo zstd > /sys/block/zram0/comp_algorithm
          - Or UCI: option zram_comp_algo 'zstd'
          EOF

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-${{ env.DEVICE }}-ap-${{ github.run_number }}
          path: release/
          retention-days: 30

      - name: Create release
        if: inputs.release_tag != ''
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ inputs.release_tag }}
          files: release/*
          body: |
            OpenWrt Firmware for CMCC PZ-L8 (AP Mode)

            ## Features
            - AP Mode with all ports bridged
            - 802.11s mesh support with usteer
            - ath11k-smallbuffers for 256MB RAM optimization
            - WiFi BDF from official firmware 501.11
            - Based on OpenWrt main branch

            ## Network
            - All ports bridged as br-lan
            - DHCP client with 192.168.10.1 fallback
            - IPv6 via SLAAC

            ## WiFi
            - 2.4GHz: IPQ5000 (SoC built-in)
            - 5GHz: QCN6102

            ## ZRAM Compression
            - Supported: lzo, lzo-rle, zstd
            - Default: lzo-rle (low CPU usage)
            - To switch: `echo zstd > /sys/block/zram0/comp_algorithm`
            - Or via UCI: `option zram_comp_algo 'zstd'`
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
