        working-directory: openwrt
        run: |
          for i in 1 2 3; do
            echo "Download attempt $i/3..."
            if make download -j$(nproc) V=s; then
              break
            fi
            [ $i -eq 3 ] && exit 1
            sleep 30
          done

      - name: Build
        working-directory: openwrt
        run: make -j$(nproc) V=w || make -j1 V=s

      - name: Prepare artifacts
        run: |
          mkdir -p artifacts
          find openwrt/bin/targets -name "*.bin" -exec cp {} artifacts/ \;
          find openwrt/bin/targets -name "*.img.gz" -exec cp {} artifacts/ \;
          cd artifacts && sha256sum * > sha256sums-router.txt

          echo "BUILD_MODE=Router" > BUILD_INFO.txt
          echo "BUILD_TIME=$(date -u +"%Y-%m-%d %H:%M:%S UTC")" >> BUILD_INFO.txt
          cp BUILD_INFO.txt artifacts/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-router
          path: artifacts/
          retention-days: 1

  release:
    name: Create Release
    needs: [build-ap, build-router]
    runs-on: ubuntu-22.04

    steps:
      - name: Download AP artifacts
        uses: actions/download-artifact@v4
        with:
          name: openwrt-ap
          path: artifacts/ap/

      - name: Download Router artifacts
        uses: actions/download-artifact@v4
        with:
          name: openwrt-router
          path: artifacts/router/

      - name: Prepare release files
        run: |
          mkdir -p release

          # Copy and rename AP files
          for f in artifacts/ap/*.bin; do
            [ -f "$f" ] && cp "$f" "release/$(basename ${f%.bin})-ap.bin"
          done
          for f in artifacts/ap/*.img.gz; do
            [ -f "$f" ] && cp "$f" "release/$(basename ${f%.img.gz})-ap.img.gz"
          done

          # Copy and rename Router files
          for f in artifacts/router/*.bin; do
            [ -f "$f" ] && cp "$f" "release/$(basename ${f%.bin})-router.bin"
          done
          for f in artifacts/router/*.img.gz; do
            [ -f "$f" ] && cp "$f" "release/$(basename ${f%.img.gz})-router.img.gz"
          done

          # Generate combined sha256sums
          cd release
          sha256sum *.bin *.img.gz > sha256sums

          # Create release notes
          cat > RELEASE_NOTES.md << 'EOF'
          ## OpenWrt Firmware for CMCC PZ-L8

          **Branch:** openwrt-25.12
          **Patches:** PR #21495 (cherry-picked)

          ### Files

          | File | Mode | Description |
          |------|------|-------------|
          | `*-ap.bin` | AP | Factory image for AP mode |
          | `*-ap.img.gz` | AP | Sysupgrade image for AP mode |
          | `*-router.bin` | Router | Factory image for Router mode |
          | `*-router.img.gz` | Router | Sysupgrade image for Router mode |

          ### AP Mode
          - All ports bridged (lan1, lan2, lan3, wan)
          - DHCP client with 192.168.10.1 fallback
          - 802.11s mesh support with usteer
          - No firewall, no DHCP server

          ### Router Mode
          - Full router features
          - WAN: wan port (DHCP or PPPoE)
          - LAN: lan1, lan2, lan3 bridged
          - Firewall, NAT, IPv6 support

          ### Common Features
          - WiFi: 2.4GHz (IPQ5000) + 5GHz (QCN6102)
          - Driver: ath11k-smallbuffers (256MB RAM optimized)
          - ZRAM: lzo-rle (default) / zstd (optional)

          ### ZRAM Compression
          - Supported: lzo, lzo-rle, zstd
          - Default: lzo-rle (low CPU usage)
          - Switch to zstd: `echo zstd > /sys/block/zram0/comp_algorithm`
          - Or via UCI: `option zram_comp_algo 'zstd'`

          ### Install
          1. Flash factory image via stock firmware web UI
          2. Or use sysupgrade to upgrade from existing OpenWrt
          EOF

          ls -la

      - name: Create release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ inputs.release_tag }}
          files: release/*
          body_path: release/RELEASE_NOTES.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
